name: Deploy to OCI

on:
  push:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('backend/build.gradle') }}
          restore-keys: |
            gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:latest \
            ./backend

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:latest \
            ./frontend

  deploy:
    runs-on: ubuntu-22.04
    needs: [ changes, build-backend, build-frontend ]
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - name: Deploy via SSH (Rolling)
        uses: appleboy/ssh-action@v1
        with:
          host: 168.107.26.27
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/opc/app
            docker compose -f /home/opc/app/docker-compose.yml pull backend frontend
            JASYPT_ENCRYPTOR_PASSWORD=${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }} docker compose -f /home/opc/app/docker-compose.yml up -d --no-deps backend frontend
            sleep 15
            docker compose -f /home/opc/app/docker-compose.yml ps
            docker image prune -f
