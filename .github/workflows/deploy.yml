name: Deploy to OCI

on:
  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('backend/build.gradle') }}
          restore-keys: |
            gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-

      - name: Set up QEMU (aarch64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:latest \
            ./backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up QEMU (aarch64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:latest \
            ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Deploy via SSH (Rolling)
        uses: appleboy/ssh-action@v1
        with:
          host: 168.107.26.27
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/opc/app
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose pull backend frontend
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} JASYPT_ENCRYPTOR_PASSWORD=${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }} docker compose up -d --no-deps backend frontend
            sleep 15
            docker compose ps
            docker image prune -f
