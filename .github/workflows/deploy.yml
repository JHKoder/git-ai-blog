name: Deploy to OCI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (aarch64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:latest \
            ./backend

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:latest \
            ./frontend

      - name: Deploy via SSH (Rolling)
        uses: appleboy/ssh-action@v1
        with:
          host: 168.107.26.27
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/opc/app
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose pull backend frontend
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d --no-deps backend frontend
            sleep 15
            docker compose ps
            docker image prune -f
