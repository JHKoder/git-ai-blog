name: Deploy to OCI

on:
  push:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  check-prev-result:
    runs-on: ubuntu-22.04
    outputs:
      backend_needs_build: ${{ steps.check.outputs.backend_needs_build }}
      frontend_needs_build: ${{ steps.check.outputs.frontend_needs_build }}
    steps:
      - name: Check previous run results
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 현재 실행(run_id)을 제외한 가장 최근 완료된 실행 1개 조회
          PREV_RUN=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=deploy.yml \
            --branch=main \
            --status=completed \
            --limit=5 \
            --json databaseId,conclusion \
            | jq -r "[.[] | select(.databaseId != ${{ github.run_id }})] | first")

          echo "Previous run: $PREV_RUN"

          if [ "$PREV_RUN" = "null" ] || [ -z "$PREV_RUN" ]; then
            # 이전 실행 기록 자체 없음 → 최초 실행이므로 무조건 빌드
            echo "backend_needs_build=true" >> "$GITHUB_OUTPUT"
            echo "frontend_needs_build=true" >> "$GITHUB_OUTPUT"
            echo "No previous run found — forcing build"
            exit 0
          fi

          PREV_RUN_ID=$(echo "$PREV_RUN" | jq -r '.databaseId')
          PREV_CONCLUSION=$(echo "$PREV_RUN" | jq -r '.conclusion')
          echo "Previous run id=$PREV_RUN_ID conclusion=$PREV_CONCLUSION"

          # 이전 실행이 실패면 무조건 재빌드
          if [ "$PREV_CONCLUSION" = "failure" ]; then
            echo "backend_needs_build=true" >> "$GITHUB_OUTPUT"
            echo "frontend_needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Previous run failed — forcing rebuild"
            exit 0
          fi

          # 이전 실행의 각 job 결과 조회
          JOBS=$(gh run view "$PREV_RUN_ID" \
            --repo "${{ github.repository }}" \
            --json jobs \
            | jq -r '.jobs')

          BACKEND_RESULT=$(echo "$JOBS" | jq -r '[.[] | select(.name == "build-backend")] | first | .conclusion // "none"')
          FRONTEND_RESULT=$(echo "$JOBS" | jq -r '[.[] | select(.name == "build-frontend")] | first | .conclusion // "none"')

          echo "Previous backend job: $BACKEND_RESULT"
          echo "Previous frontend job: $FRONTEND_RESULT"

          # 이전 job이 failure 또는 기록 없음 → 재빌드 필요
          if [ "$BACKEND_RESULT" = "failure" ] || [ "$BACKEND_RESULT" = "none" ]; then
            echo "backend_needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_needs_build=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FRONTEND_RESULT" = "failure" ] || [ "$FRONTEND_RESULT" = "none" ]; then
            echo "frontend_needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    needs: [ changes, check-prev-result ]
    if: needs.changes.outputs.backend == 'true' || needs.check-prev-result.outputs.backend_needs_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('backend/build.gradle') }}
          restore-keys: |
            gradle-${{ hashFiles('backend/gradle/wrapper/gradle-wrapper.properties') }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/aiblog-backend:latest \
            ./backend

  build-frontend:
    needs: [ changes, check-prev-result ]
    if: needs.changes.outputs.frontend == 'true' || needs.check-prev-result.outputs.frontend_needs_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci                     # npm install 대신 ci 사용 (더 빠르고 안정적)

      - name: Build frontend (타입 체크 포함)
        run: |
          cd frontend
          npm run type-check || true   # 타입 에러는 빌드 전에 잡기
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile          # Multi-stage Dockerfile 경로
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/aiblog-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend