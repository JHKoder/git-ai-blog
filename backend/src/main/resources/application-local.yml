spring:
  datasource:
    url: jdbc:h2:mem:aiblog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:local-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:local-client-secret}
            scope: read:user,user:email

ai:
  daily-limit: 5
