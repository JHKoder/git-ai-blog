spring:
  datasource:
    url: jdbc:h2:mem:aiblog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: local-dummy-client-id
            client-secret: local-dummy-client-secret
            scope: read:user,user:email

jwt:
  secret: local-dev-only-jwt-secret-minimum-32bytes!

cloudinary:
  cloud-name: local-dummy-cloud
  api-key: local-dummy-api-key
  api-secret: local-dummy-api-secret

ai:
  daily-limit: 5
