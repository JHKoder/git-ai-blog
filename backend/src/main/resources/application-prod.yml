spring:
  datasource:
    url: ENC(여기에_암호화된_JDBC_URL)
    driver-class-name: org.postgresql.Driver
    username: ENC(여기에_암호화된_PG_USERNAME)
    password: ENC(여기에_암호화된_PG_PASSWORD)
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ENC(여기에_암호화된_GITHUB_CLIENT_ID)
            client-secret: ENC(여기에_암호화된_GITHUB_CLIENT_SECRET)
            scope: read:user,user:email

frontend:
  url: "https://git-ai-blog.kr"

ai:
  daily-limit: 20

logging:
  level:
    github.jhkoder.aiblog: INFO
