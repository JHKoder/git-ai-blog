resilience4j:
  retry:
    instances:
      ai-client:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - github.jhkoder.aiblog.common.exception.ExternalApiException
      hashnode:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - github.jhkoder.aiblog.common.exception.ExternalApiException
  circuitbreaker:
    instances:
      ai-client:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
      hashnode:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5

logging:
  level:
    github.jhkoder.aiblog: DEBUG
