spring:
  application:
    name: ai-blog
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms


jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:local-jasypt-password}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

db:
  encryption:
    key: ENC(ETl3xrQc7DC/P3Fj6eeoyxF1PF61ofcDcVgWR0ZgyDbdrSvRQjGPcuEYRG9TGKZK)

jwt:
  secret: ENC(vIYDUePfglwxyetw0/0LUx5P5E5hNCuhxmAYDVixz6Bl0QV3E+ikHey0YESW/HL+)
  expiration: 86400000
  refresh-expiration: 2592000000

ai:
  claude:
    base-url: https://api.anthropic.com
  grok:
    base-url: https://api.x.ai

cloudinary:
  cloud-name: ENC(xJuRYdtO8SDrSa5jq5gYHv/sUPHn/Osb)
  api-key: ENC(PZqW8dWU5yo8NArAun26Bd9WsNcvYaN3)
  api-secret: ENC(tASMipKZ29AOXP0SntuzlscZvsg7b0s3sgp0yjn6HVsQD5SenaylBw==)

frontend:
  url: "http://localhost:5173"

resilience4j:
  retry:
    instances:
      ai-client:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - github.jhkoder.aiblog.common.exception.ExternalApiException
      hashnode:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - github.jhkoder.aiblog.common.exception.ExternalApiException
  circuitbreaker:
    instances:
      ai-client:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
      hashnode:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5

logging:
  level:
    github.jhkoder.aiblog: DEBUG
