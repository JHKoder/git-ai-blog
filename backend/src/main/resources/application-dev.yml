spring:
  datasource:
    url: ENC(여기에_암호화된_JDBC_URL)
    driver-class-name: org.postgresql.Driver
    username: ENC(여기에_암호화된_PG_USERNAME)
    password: ENC(여기에_암호화된_PG_PASSWORD)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ENC(여기에_암호화된_GITHUB_CLIENT_ID)
            client-secret: ENC(여기에_암호화된_GITHUB_CLIENT_SECRET)
            scope: read:user,user:email

ai:
  daily-limit: 20
